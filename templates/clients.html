<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиенты</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; }
        nav { background: #333; color: #fff; padding: 1rem; }
        nav ul { list-style: none; display: flex; gap: 2rem; }
        nav a { color: #fff; text-decoration: none; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 1.5rem; }
        .actions { margin-bottom: 1rem; }
        a.btn { padding: 0.5rem 1rem; background: #333; color: #fff; text-decoration: none; display: inline-block; }
        a.btn:hover { background: #555; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Главная</a></li>
            <li><a href="/products">Товары</a></li>
            <li><a href="/suppliers">Поставщики</a></li>
            <li><a href="/clients">Клиенты</a></li>
            <li><a href="/stock">Остатки</a></li>
            <li><a href="/incoming">Приход</a></li>
            <li><a href="/outgoing">Расход</a></li>
            <li><a href="/reports/movement">Отчеты</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>Клиенты</h1>
        <div class="actions">
            <a href="/clients/add" class="btn">Добавить клиента</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Наименование/ФИО</th>
                    <th>Телефон</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {{range .}}
                <tr>
                    <td>{{.ID}}</td>
                    <td>{{.Name}}</td>
                    <td>{{.Phone}}</td>
                    <td><a href="/clients/edit?id={{.ID}}">Редактировать</a></td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="4">Клиенты не найдены</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</body>
</html>
